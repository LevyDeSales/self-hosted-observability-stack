services:
  beszel-hub:
    image: ${BESZEL_IMAGE:-henrygd/beszel:0.18.7}
    container_name: observability-beszel-hub
    restart: unless-stopped
    environment:
      APP_URL: ${BESZEL_APP_URL:?set BESZEL_APP_URL}
      CHECK_UPDATES: "false"
      TZ: ${TZ:-UTC}
    volumes:
      - beszel_data:/beszel_data
    networks:
      - dokploy-network
    expose:
      - "8090"

  beszel-agent-local:
    image: ${BESZEL_AGENT_IMAGE:-henrygd/beszel-agent:0.18.7}
    container_name: observability-beszel-agent-local
    restart: unless-stopped
    network_mode: host
    command:
      - -k
      - ${BESZEL_AGENT_KEY:?set BESZEL_AGENT_KEY}
      - -l
      - ${BESZEL_AGENT_LISTEN:?set BESZEL_AGENT_LISTEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  beszel_data:

networks:
  dokploy-network:
    external: true
